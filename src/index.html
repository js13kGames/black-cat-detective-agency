<head>
    <meta charset="utf-8" />
    <title>Black Cat Detective Agency</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #111;
            font-family: 'Courier New', monospace;
        }

        #c {
            width: 100vw;
            height: 100vh;
            display: block
        }

        #c2 {
            width: 100vw;
            height: 100vh;
            position: absolute;
        }

        #take-pic {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #000;
            max-width: 300px;
            z-index: 10;
        }

        #album {
            position: absolute;
            top: 10px;
            right: 10px;
            border: 3px solid #fff;
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            background: #fff;
        }

        .screenshot {
            max-width: 100px;
            object-fit: cover;
            margin: 5px;
            border: 2px solid #fff;
        }

        .hidden {
            display: none !important;
        }

        #camera-ui {
            position: absolute;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.09);
            pointer-events: none;
        }

        #camera-border {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            border: 2px solid #fff;
            box-sizing: border-box;
        }

        #plus {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- TODO: obviously I need to refactor this a lot, minify css, remove the elements and create them dynamically -->
    <!-- The game! -->
    <canvas id="c"></canvas>
    <!-- The phone! -->
    <canvas id="c2"></canvas>
    <div id="camera-ui" class="hidden">
        <div id="camera-border"></div>
        <div id="plus">+</div>
    </div>
    <div id="album"></div>

    <!-- instructions-->
    <div id="instructions" class="hidden">
        <p>Hit Space to enter camera mode</p>
        <p>Hit Z to zoom in</p>
        <p>Hit X to zoom out</p>
        <p>Hit C to take a picture</p>
        <p>press P to toggle instructions </p>
        <p>Here is a list of all the dogs you've gotten so far</p>
    </div>


    <script>
        // WebGL linting! This is a hack to make sure it doesn't get into the final zip!
        if (location.hostname === 'localhost') {
            const s = document.createElement('script');
            s.src = 'https://greggman.github.io/webgl-lint/webgl-lint.js';
            document.head.appendChild(s);
        }
    </script>
    <!-- inline-start -->
    <script src="./utils.js"></script>
    <script src="./m4.js"></script>
    <script src="./object.js"></script>
    <script src="./3d.js"></script>
    <script src="./2d.js"></script>
    <!-- inline-end -->
</body>
