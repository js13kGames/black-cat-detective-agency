    <style>html,body{margin:0;height:100%;background:#111;font-family:'Courier New',monospace}p{margin:0 0 10px}ul{padding-inline-start:15px}#c{width:100vw;height:100vh;display:block}#c2{width:100vw;height:100vh;position:absolute}#take-pic{position:absolute;top:10px;left:10px;padding:10px}#instructions{position:absolute;top:10px;left:10px;padding:10px;z-index:10;height:90vh}#text-messages{position:absolute;top:10px;right:10px;padding:10px;z-index:10;height:90vh}.screenshot{width:285px;object-fit:cover;margin:5px;border:2px solid #fff}.hide{opacity:0;transition:opacity 0.5s ease}.show{opacity:1;transition:opacity 0.5s ease}.hidden{display:none!important}#camera-ui{position:absolute;left:0;top:0;width:100vw;height:100vh;box-sizing:border-box;background:rgb(0 0 0 / .25);pointer-events:none}#camera-border-small{position:absolute;left:50%;top:50%;width:300px;height:300px;transform:translate(-50%,-50%);background:linear-gradient(to right,#fff 4px,transparent 4px) 0 0,linear-gradient(to right,#fff 4px,transparent 4px) 0 100%,linear-gradient(to left,#fff 4px,transparent 4px) 100% 0,linear-gradient(to left,#fff 4px,transparent 4px) 100% 100%,linear-gradient(to bottom,#fff 4px,transparent 4px) 0 0,linear-gradient(to bottom,#fff 4px,transparent 4px) 100% 0,linear-gradient(to top,#fff 4px,transparent 4px) 0 100%,linear-gradient(to top,#fff 4px,transparent 4px) 100% 100%;background-repeat:no-repeat;background-size:20px 20px}#camera-border-large{position:absolute;left:0;top:0;width:calc(100vw - 100px);height:calc(100vh - 100px);position:absolute;margin:50px;background:linear-gradient(to right,#fff 4px,transparent 4px) 0 0,linear-gradient(to right,#fff 4px,transparent 4px) 0 100%,linear-gradient(to left,#fff 4px,transparent 4px) 100% 0,linear-gradient(to left,#fff 4px,transparent 4px) 100% 100%,linear-gradient(to bottom,#fff 4px,transparent 4px) 0 0,linear-gradient(to bottom,#fff 4px,transparent 4px) 100% 0,linear-gradient(to top,#fff 4px,transparent 4px) 0 100%,linear-gradient(to top,#fff 4px,transparent 4px) 100% 100%;background-repeat:no-repeat;background-size:75px 75px}#plus{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:100px;color:#fff}.text{color:#746dc3;width:300px;background:rgb(255 255 255 / .95);padding:10px;margin-bottom:10px;font-size:22px}.left-text{position:relative;width:300px}.left-text::before{content:"";position:absolute;top:0;left:-9px;width:10px;height:10px;background:#fff}.right-text{position:relative}.right-text::before{content:"";position:absolute;top:0;right:-10px;width:10px;height:10px;background:#fff}.instruction-block{padding:10px;margin-bottom:10px;font-size:22px;max-width:300px;background-color:#cfd5fd;color:#746dc3;border:5px solid rgb(201 207 247)}.instruction-title{background:#746dc3;color:#fff;padding:5px;font-weight:700;margin:-10px -10px 10px -10px}</style>
