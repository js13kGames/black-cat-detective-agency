<head>
    <meta charset="utf-8" />
    <title>Black Cat Detective Agency</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background: #111;
            font-family: 'Courier New', monospace;
        }

        p {
            margin: 0 0 10px;
        }

        ul {
            padding-inline-start: 15px;
        }

        #c {
            width: 100vw;
            height: 100vh;
            display: block
        }

        #c2 {
            width: 100vw;
            height: 100vh;
            position: absolute;
        }

        #take-pic {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            z-index: 10;
            height: 90vh;
        }

        #text-messages {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            z-index: 10;
            height: 90vh;
        }

        .screenshot {
            width: 285px;
            object-fit: cover;
            margin: 5px;
            border: 2px solid #fff;
        }

        .hide {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .show {
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .hidden {
            display: none !important;
        }

        #camera-ui {
            position: absolute;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        /* https://stackoverflow.com/questions/14387690/how-can-i-show-only-corner-borders */
        #camera-border-small {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            background:
                linear-gradient(to right, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to right, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 100%,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to top, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to top, #fff 4px, transparent 4px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 20px 20px;
        }

        #camera-border-large {
            position: absolute;
            left: 0;
            top: 0;
            width: calc(100vw - 100px);
            height: calc(100vh - 100px);
            position: absolute;
            margin: 50px;
            background:
                linear-gradient(to right, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to right, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to left, #fff 4px, transparent 4px) 100% 100%,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 0 0,
                linear-gradient(to bottom, #fff 4px, transparent 4px) 100% 0,
                linear-gradient(to top, #fff 4px, transparent 4px) 0 100%,
                linear-gradient(to top, #fff 4px, transparent 4px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 75px 75px;
        }

        #plus {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            color: #fff;
        }

        .text {
            color: #746dc3;
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .left-text {
            position: relative;
            width: 300px;
        }

        .left-text::before {
            content: "";
            position: absolute;
            top: 0px;
            left: -9px;
            width: 10px;
            height: 10px;
            background: #fff;
        }

        .right-text {
            position: relative;
        }

        .right-text::before {
            content: "";
            position: absolute;
            top: 0px;
            right: -10px;
            width: 10px;
            height: 10px;
            background: #fff;
        }

        .instruction-block {
            padding: 10px;
            margin-bottom: 10px;
            font-size: 22px;
            max-width: 300px;
            background-color: rgb(207, 213, 253);
            color: #746dc3;
            border: 5px solid rgba(201, 207, 247, 1);
        }
        .instruction-title {
            background: #746dc3;
            color: white;
            padding: 5px;
            font-weight: bold;
            margin: -10px -10px 10px -10px;
        }
    </style>
</head>

<body>

    <!-- TODO: obviously I need to refactor this a lot, minify css, remove the elements and create them dynamically -->
    <!-- The game! -->
    <canvas id="c"></canvas>
    <!-- The phone! -->
    <canvas id="c2"></canvas>
    <div id="camera-ui" class="hidden">
        <div id="camera-border-large"></div>
        <div id="camera-border-small"></div>
        <div id="plus">+</div>
    </div>

    <!-- instructions-->
    <div id="instructions" class="hidden">
        <div class="instruction-block">
            <div class="instruction-title">Instructions</div>
            <ul>
                <li>click or use arrows to look around</li>
                <li>spacebar: enter camera mode</li>
                <li>z: zoom in</li>
                <li>x: zoom out</li>
                <li>c: take a picture</li>
            </ul>
        </div>
    </div>

    <div id="text-messages" class="hidden">
        <div class="text left-text" id="mission-text"></div>
        <div id="album"></div>
    </div>

        // WebGL linting! This is a hack to make sure it doesn't get into the final zip!

            document.head.appendChild(s);
        }
